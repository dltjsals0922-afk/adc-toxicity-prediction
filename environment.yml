name: adc-env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - rdkit>=2023.03
  - scikit-learn>=1.3
  - xgboost>=1.7
  - imbalanced-learn>=0.11
  - matplotlib>=3.7
  - seaborn>=0.12
  - jupyterlab>=4.0
  - ipykernel
  - pip
  - pip:
    - chembl-webresource-client>=0.10.8
    - shap>=0.44
    - mols2grid
    - tqdm
